<!DOCTYPE html>
<html lang="ko">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d14;
      --purple-400: #a78bfa;
      --text: #e8e8f0;
      --text-secondary: #9898b0;
    }
    * { margin:0; padding:0; box-sizing:border-box }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      background: var(--purple-400);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    .btn:hover { background: #8b6cf6; }
    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: #6a6a80;
    }
    .footer a {
      color: #a78bfa;
      text-decoration: none;
      margin: 0 8px;
    }
  </style>

<body>
  <div class="container">
    <h1>uooo</h1>
    <p>
      <strong>내 데이터는 나만 볼 수 있습니다.</strong><br>
      uooo는 비밀번호와 키 파일로 개인 데이터를 암호화하여<br>
      Google Drive, Dropbox 등 다양한 클라우드에 안전하게 백업하는<br>
      제로 지식(Zero-Knowledge) 투두리스트입니다.
    </p>
    <a href="app.html" class="btn">🔐 앱 열기</a>

    <div class="footer">
      <a href="privacy.html">개인정보 처리방침</a> ·
